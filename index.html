<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Informatique</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a, #111827);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .quiz-container {
      width: 100%;
      max-width: 700px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 10px;
      color: #22c55e;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .info-box {
      flex: 1;
      min-width: 140px;
      background: rgba(255, 255, 255, 0.06);
      padding: 12px 16px;
      border-radius: 14px;
      color: #e2e8f0;
      font-weight: bold;
      text-align: center;
    }

    .question-box {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .question {
      font-size: 22px;
      margin: 0;
      line-height: 1.4;
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    .answer-btn {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
    }

    .answer-btn:hover {
      background: rgba(34, 197, 94, 0.18);
      transform: translateY(-2px);
    }

    .answer-btn.correct {
      background: #16a34a;
    }

    .answer-btn.wrong {
      background: #dc2626;
    }

    .answer-btn:disabled {
      cursor: not-allowed;
      opacity: 0.95;
    }

    .next-btn,
    .restart-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .next-btn:hover,
    .restart-btn:hover {
      opacity: 0.95;
    }

    .result-box {
      text-align: center;
      display: none;
    }

    .result-box h2 {
      color: #22c55e;
      font-size: 32px;
      margin-bottom: 10px;
    }

    .final-score {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .message {
      color: #cbd5e1;
      font-size: 18px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .question {
        font-size: 18px;
      }

      .answer-btn {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <h1>Quiz Informatique 💻</h1>
    <p class="subtitle">Teste tes connaissances en coding et informatique</p>

    <div id="quizBox">
      <div class="top-bar">
        <div class="info-box">Question <span id="questionNumber">1</span>/10</div>
        <div class="info-box">Score : <span id="score">0</span></div>
      </div>

      <div class="question-box">
        <h2 class="question" id="questionText"></h2>
      </div>

      <div class="answers" id="answersContainer"></div>

      <button class="next-btn" id="nextBtn" style="display: none;">Question suivante</button>
    </div>

    <div class="result-box" id="resultBox">
      <h2>Quiz terminé 🎉</h2>
      <div class="final-score">Ton score : <span id="finalScore"></span>/10</div>
      <div class="message" id="resultMessage"></div>
      <button class="restart-btn" onclick="restartQuiz()">Rejouer</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "Que signifie HTML ?",
        answers: [
          "Hyper Text Markup Language",
          "High Text Machine Language",
          "Hyper Transfer Markup Level",
          "Home Tool Markup Language"
        ],
        correct: 0
      },
      {
        question: "Quel langage est principalement utilisé pour styliser une page web ?",
        answers: [
          "Python",
          "Java",
          "CSS",
          "C++"
        ],
        correct: 2
      },
      {
        question: "Quel langage permet de rendre une page web interactive ?",
        answers: [
          "JavaScript",
          "HTML",
          "SQL",
          "Excel"
        ],
        correct: 0
      },
      {
        question: "Quel symbole sert souvent à sélectionner un id en CSS ?",
        answers: [
          ".",
          "#",
          "@",
          "&"
        ],
        correct: 1
      },
      {
        question: "Dans JavaScript, comment déclare-t-on une variable moderne ?",
        answers: [
          "dim",
          "echo",
          "let",
          "print"
        ],
        correct: 2
      },
      {
        question: "Que signifie CSS ?",
        answers: [
          "Creative Style Sheet",
          "Cascading Style Sheets",
          "Computer Styled Sections",
          "Colorful Style Syntax"
        ],
        correct: 1
      },
      {
        question: "Quel élément HTML utilise-t-on pour créer un bouton ?",
        answers: [
          "<btn>",
          "<inputbutton>",
          "<button>",
          "<press>"
        ],
        correct: 2
      },
      {
        question: "Quel langage est souvent utilisé côté serveur parmi ces choix ?",
        answers: [
          "PHP",
          "CSS",
          "HTML",
          "Canva"
        ],
        correct: 0
      },
      {
        question: "Que fait la propriété CSS 'color' ?",
        answers: [
          "Change la couleur du texte",
          "Change la taille du texte",
          "Ajoute une bordure",
          "Centre le texte"
        ],
        correct: 0
      },
      {
        question: "Quel outil sert à versionner le code ?",
        answers: [
          "Git",
          "Figma",
          "Word",
          "Photoshop"
        ],
        correct: 0
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    const questionText = document.getElementById("questionText");
    const answersContainer = document.getElementById("answersContainer");
    const questionNumber = document.getElementById("questionNumber");
    const scoreDisplay = document.getElementById("score");
    const nextBtn = document.getElementById("nextBtn");
    const quizBox = document.getElementById("quizBox");
    const resultBox = document.getElementById("resultBox");
    const finalScore = document.getElementById("finalScore");
    const resultMessage = document.getElementById("resultMessage");

    function showQuestion() {
      answered = false;
      nextBtn.style.display = "none";

      const current = questions[currentQuestion];
      questionText.textContent = current.question;
      questionNumber.textContent = currentQuestion + 1;
      scoreDisplay.textContent = score;

      answersContainer.innerHTML = "";

      current.answers.forEach((answer, index) => {
        const button = document.createElement("button");
        button.classList.add("answer-btn");
        button.textContent = answer;
        button.onclick = () => selectAnswer(index, button);
        answersContainer.appendChild(button);
      });
    }

    function selectAnswer(index, buttonClicked) {
      if (answered) return;
      answered = true;

      const current = questions[currentQuestion];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach((button, btnIndex) => {
        button.disabled = true;

        if (btnIndex === current.correct) {
          button.classList.add("correct");
        }

        if (btnIndex === index && index !== current.correct) {
          button.classList.add("wrong");
        }
      });

      if (index === current.correct) {
        score++;
        scoreDisplay.textContent = score;
      }

      nextBtn.style.display = "block";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;

      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    });

    function showResult() {
      quizBox.style.display = "none";
      resultBox.style.display = "block";
      finalScore.textContent = score;

      if (score >= 9) {
        resultMessage.textContent = "Excellent 🔥 Tu maîtrises vraiment le sujet !";
      } else if (score >= 7) {
        resultMessage.textContent = "Très bien 👏 Tu as de bonnes bases en informatique.";
      } else if (score >= 5) {
        resultMessage.textContent = "Pas mal 🙂 Continue à t'entraîner.";
      } else {
        resultMessage.textContent = "À améliorer 💪 Tu peux encore progresser.";
      }
    }

    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      quizBox.style.display = "block";
      resultBox.style.display = "none";
      showQuestion();
    }

    showQuestion();
  </script>
</body>
</html>
